services:
  db:
    image: postgres:alpine
    container_name: ssbw-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-una_clave_muy_segura_123}
      POSTGRES_DB: ${POSTGRES_DB:-ssbw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
